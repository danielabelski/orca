name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Normalize node-gyp launcher perms
        # pnpm's bundled node-gyp/gyp/gyp_main.py may lack +x, which causes
        # make's "Regenerating Makefile" action to fail with Permission denied
        # when concurrent native builds (node-pty, cpu-features) race on the
        # shared header cache and trigger Makefile re-generation.
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t GYP_MAIN_FILES < <(
            find "$HOME/.cache" "$HOME/.local/share" -path '*/node-gyp/gyp/gyp_main.py' -type f 2>/dev/null
          )
          if [ "${#GYP_MAIN_FILES[@]}" -eq 0 ]; then
            echo "No cached gyp_main.py found before install; continuing"
            exit 0
          fi
          for gyp_main in "${GYP_MAIN_FILES[@]}"; do
            ls -l "$gyp_main"
            chmod +x "$gyp_main"
            ls -l "$gyp_main"
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec oxlint --format github

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

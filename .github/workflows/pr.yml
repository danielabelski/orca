name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Install dependencies
        # Why: the flaky failure happens while pnpm is materializing its own
        # bundled node-gyp launcher for this job. Normalizing execute bits only
        # on pre-existing cache entries can miss the file that the failing run
        # actually uses, so retry once after chmod'ing the launcher paths that
        # now exist in this workspace.
        shell: bash
        run: |
          set -euo pipefail
          if pnpm install --frozen-lockfile; then
            exit 0
          fi

          echo "pnpm install failed; normalizing gyp_main.py permissions before one retry"
          mapfile -t GYP_MAIN_FILES < <(
            find "$GITHUB_WORKSPACE/node_modules" "$HOME/.cache" "$HOME/.local/share" \
              -path '*/node-gyp/gyp/gyp_main.py' -type f 2>/dev/null
          )
          if [ "${#GYP_MAIN_FILES[@]}" -eq 0 ]; then
            echo "No gyp_main.py files found after failed install"
          else
            for gyp_main in "${GYP_MAIN_FILES[@]}"; do
              ls -l "$gyp_main"
              chmod +x "$gyp_main"
              ls -l "$gyp_main"
            done
          fi

          pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec oxlint --format github

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
